<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rice Field Monitor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#eef3ef;
display:flex;
justify-content:center;
padding:30px;

}

.phone{

width:400px;
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,.15);

}

h1{

text-align:center;
color:#2E7D32;
margin-bottom:5px;

}

.subtitle{

text-align:center;
color:#666;
font-size:14px;
margin-bottom:25px;

}

.card{

background:#fafafa;
border:1px solid #ddd;
border-radius:12px;
padding:18px;
margin-bottom:18px;

}

.card h2{

color:#2E7D32;
margin-bottom:15px;

}

#alert{

line-height:1.8;
font-size:14px;
color:#444;

}

button{

width:100%;
padding:14px;
margin-top:15px;
border:none;
background:#2E7D32;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;

}

button:hover{

background:#256528;

}

.history-item{

padding:12px;
border-bottom:1px solid #ddd;
cursor:pointer;

}

.history-item:hover{

background:#f0f8f0;

}

.history-title{

font-weight:bold;
margin-bottom:5px;

}

.history-sub{

font-size:13px;
color:#666;

}

.badge{

float:right;
padding:4px 10px;
border-radius:20px;
font-size:12px;
color:white;

}

.safe{

background:#1976D2;

}

.critical{

background:#C62828;

}

</style>

</head>

<body>

<div class="phone">

<h1>Rice Field Monitor</h1>

<p class="subtitle">

AI-Powered Rice Pest Detection and Automatic Pesticide Application

</p>

<div class="card">

<h2>Latest Alert Details</h2>

<div id="alert">

Press <b>Start Scan</b> to inspect the rice field.

</div>

<button onclick="scanField()" id="scanBtn">

Start Scan

</button>

</div>

<div class="card">

<h2>Detection History</h2>

<div id="history"></div>

</div>

</div>

<script>

let historyDiv=document.getElementById("history");
let alertDiv=document.getElementById("alert");

let history=[];

function scanField(){

let btn=document.getElementById("scanBtn");

btn.disabled=true;
btn.innerHTML="Scanning...";

alertDiv.innerHTML="Scanning rice field...";

setTimeout(createResult,2000);

}

function createResult(){

let pests=Math.floor(Math.random()*6);

let plots=[
"Plot A-1",
"Plot A-2",
"Plot B-1",
"Plot B-2",
"Plot C-1"
];

let plot=plots[Math.floor(Math.random()*plots.length)];

let now=new Date();

let date=now.toLocaleDateString();

let time=now.toLocaleTimeString([],{

hour:'2-digit',
minute:'2-digit'

});

let data={};

if(pests>0){

let pesticide=(pests*0.125).toFixed(2);

data={

pest:"Rice Hopper",
count:pests,
threat:"Critical",
action:pesticide+" mL localized pesticide applied",
plot:plot,
date:date,
time:time,
status:"Critical"

};

}else{

data={

pest:"None",
count:0,
threat:"Safe",
action:"No pesticide required",
plot:plot,
date:date,
time:time,
status:"Safe"

};

}

history.unshift(data);

showAlert(data);

renderHistory();

let btn=document.getElementById("scanBtn");

btn.disabled=false;
btn.innerHTML="Start Scan";

}

function showAlert(data){

alertDiv.innerHTML=

"<b>RICE FIELD MONITOR</b><br><br>"+

"<b>Alert Details</b><br><br>"+

"Detected Pest: "+data.pest+"<br>"+

"Pest Count: "+data.count+"<br>"+

"Threat Level: "+data.threat+"<br>"+

"Action Taken: "+data.action+"<br>"+

"Location: "+data.plot+"<br>"+

"Timestamp: "+data.date+" "+data.time;

}

function renderHistory(){

historyDiv.innerHTML="";

history.forEach(function(item,index){

let badge=item.status=="Critical"

?'<span class="badge critical">Critical</span>'

:'<span class="badge safe">Safe</span>';

historyDiv.innerHTML+=

'<div class="history-item" onclick="showAlert(history['+index+'])">'+

badge+

'<div class="history-title">'+item.date+' '+item.time+'</div>'+

'<div class="history-sub">'+item.plot+'</div>'+

'<div class="history-sub">Condition: '+item.status+'</div>'+

'</div>';

});

}

</script>

</body>
</html>
